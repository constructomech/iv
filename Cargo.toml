[package]
name = "iv"
version = "0.1.0"
edition = "2024"

[dependencies]
eframe = "0.31"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp", "tiff", "bmp"] }
log = "0.4"
env_logger = "0.11"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
